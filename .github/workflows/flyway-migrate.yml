name: Flyway migrate

# GitHub → Settings → Environments → SUPABASE → Secrets:
#   DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASS
# Supabase требует SSL (sslmode=require в JDBC URL).

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - '.github/workflows/flyway-migrate.yml'
  workflow_dispatch:

concurrency:
  group: flyway-supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: SUPABASE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flyway info
        uses: red-gate/flyway-action@v2
        with:
          url: jdbc:postgresql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?sslmode=require
          user: ${{ secrets.DB_USER }}
          password: ${{ secrets.DB_PASS }}
          locations: filesystem:migrations
          command: info

      - name: Flyway migrate
        uses: red-gate/flyway-action@v2
        with:
          url: jdbc:postgresql://${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}?sslmode=require
          user: ${{ secrets.DB_USER }}
          password: ${{ secrets.DB_PASS }}
          locations: filesystem:migrations
          command: migrate
